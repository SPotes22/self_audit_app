# .github/workflows/ci-cd.yml
name: CI/CD Pipeline - Tin y Tan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Tin - Security Scan
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pylint
    
    - name: Run Bandit (SAST)
      run: bandit -r . -f json -o bandit-report.json || true
    
    - name: Run Safety (Dependency check)
      run: safety check || true
    
    - name: Custom SAST Scan
      run: python security_audit.py || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          security_audit.py

  port-scan:
    runs-on: ubuntu-latest
    name: Tan - Port Scan
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run port scanner
      run: python scan_ports.py || true

  test-deploy:
    runs-on: ubuntu-latest
    name: Pre-deploy Validation
    needs: [security-scan, port-scan]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install test dependencies
      run: |
        pip install pytest requests
    
    - name: Create test files
      run: |
        mkdir -p static_files
        echo "Test content" > static_files/test.txt
        echo "Sensitive data" > static_files/sensitive.txt
    
    - name: Start application
      run: |
        python secure_flask_app_json_fixed.py &
        sleep 5
    
    - name: Test SQL Injection
      run: |
        curl -X POST http://localhost:5000/login \
          -H "Content-Type: application/json" \
          -d '{"username": "admin'\'' OR '\''1'\''='\''1", "password": "test"}' || true
    
    - name: Test Path Traversal
      run: |
        curl "http://localhost:5000/static/../secure_flask_app_json_fixed.py" || true
    
    - name: Test Rate Limiting
      run: |
        for i in {1..10}; do
          curl -X POST http://localhost:5000/login \
            -H "Content-Type: application/json" \
            -d '{"username":"test","password":"wrong"}' &
        done
        wait
    
    - name: Static files access test
      run: |
        curl http://localhost:5000/static/test.txt
        curl http://localhost:5000/static-list

  deploy:
    runs-on: ubuntu-latest
    needs: test-deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        # Add your deployment commands here
        # scp, rsync, docker push, etc.
