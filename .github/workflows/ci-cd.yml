# .github/workflows/ci-cd.yml
name: CI/CD Pipeline - Tin y Tan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Tin - Security Scan
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pylint flask bcrypt
    
    - name: Run Bandit (SAST)
      run: bandit -r . -f json -o bandit-report.json || true
    
    - name: Run Safety (Dependency check)
      run: safety check || true
    
    - name: Custom SAST Scan
      run: python security_audit.py || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          security_audit.py
        if-no-files-found: warn

  port-scan:
    runs-on: ubuntu-latest
    name: Tan - Port Scan
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Run port scanner
      run: python scan_ports.py || true

  test-deploy:
    runs-on: ubuntu-latest
    name: Pre-deploy Validation
    needs: [security-scan, port-scan]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install all dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask bcrypt requests pytest
    
    - name: Create static files directory
      run: |
        mkdir -p static_files
        echo "Test content" > static_files/test.txt
        echo "Welcome to static files" > static_files/welcome.txt
        echo "Sensitive data" > static_files/sensitive.txt
    
    - name: Verify static files
      run: |
        ls -la static_files/
        cat static_files/test.txt
    
    - name: Start application in background
      run: |
        python app.py > flask_app.log 2>&1 &
        echo $! > flask.pid
        sleep 10  # Dar tiempo para que inicie
    
    - name: Check if application is running
      run: |
        if curl -s http://localhost:5000/health > /dev/null; then
          echo "✅ Application is running"
          curl http://localhost:5000/health
        else
          echo "❌ Application failed to start"
          cat flask_app.log
          exit 1
        fi
    
    - name: Test SQL Injection
      run: |
        echo "🔍 Testing SQL Injection..."
        curl -s -X POST http://localhost:5000/login \
          -H "Content-Type: application/json" \
          -d '{"username": "admin'\'' OR '\''1'\''='\''1", "password": "test"}' | grep -q "error" && echo "✅ SQL injection blocked" || echo "❌ SQL injection test failed"
    
    - name: Test Path Traversal
      run: |
        echo "🔍 Testing Path Traversal..."
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:5000/static/../secure_flask_app_json_fixed.py")
        if [ "$RESPONSE" = "403" ] || [ "$RESPONSE" = "400" ]; then
          echo "✅ Path traversal blocked (HTTP $RESPONSE)"
        else
          echo "❌ Path traversal test failed (HTTP $RESPONSE)"
          exit 1
        fi
    
    - name: Test Rate Limiting
      run: |
        echo "🔍 Testing Rate Limiting..."
        for i in {1..10}; do
          curl -s -X POST http://localhost:5000/login \
            -H "Content-Type: application/json" \
            -d '{"username":"test","password":"wrong"}' > /dev/null &
        done
        wait
        # Verificar si hubo rate limiting (código 429)
        FINAL_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:5000/login \
          -H "Content-Type: application/json" \
          -d '{"username":"test","password":"wrong"}')
        if [ "$FINAL_RESPONSE" = "429" ]; then
          echo "✅ Rate limiting active"
        else
          echo "⚠️ Rate limiting not triggered (HTTP $FINAL_RESPONSE)"
        fi
    
    - name: Test Static Files Access
      run: |
        echo "🔍 Testing static files access..."
        # Probar lectura (debe funcionar)
        curl -s -f http://localhost:5000/static/test.txt > /dev/null && echo "✅ Static file readable" || echo "❌ Cannot read static file"
        
        # Probar listado
        curl -s http://localhost:5000/static-list | grep -q "files" && echo "✅ Static listing works" || echo "⚠️ Static listing may not work"
    
    - name: Test Registration and Login
      run: |
        echo "🔍 Testing registration and login..."
        
        # Registrar usuario
        REG_RESPONSE=$(curl -s -X POST http://localhost:5000/register \
          -H "Content-Type: application/json" \
          -d '{"username":"testuser","password":"TestPass123!","role":"user"}')
        echo "Registration response: $REG_RESPONSE"
        
        # Login
        LOGIN_RESPONSE=$(curl -s -X POST http://localhost:5000/login \
          -H "Content-Type: application/json" \
          -d '{"username":"testuser","password":"TestPass123!"}')
        echo "Login response: $LOGIN_RESPONSE"
        
        # Extraer token si existe
        TOKEN=$(echo $LOGIN_RESPONSE | grep -o '"token":"[^"]*' | cut -d'"' -f4)
        
        if [ ! -z "$TOKEN" ]; then
          echo "✅ Token obtained successfully"
          
          # Probar endpoint protegido
          PROTECTED_RESPONSE=$(curl -s -X POST http://localhost:5000/account \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json")
          echo "Protected endpoint response: $PROTECTED_RESPONSE"
        else
          echo "❌ Failed to obtain token"
          exit 1
        fi
    
    - name: Run Octomatrix Consumer Tests
      run: |
        echo "🔍 Running Octomatrix consumer tests..."
        if [ -f "pre_deploy_check.py" ]; then
          python pre_deploy_check.py || true
        else
          echo "⚠️ pre_deploy_check.py not found, skipping"
        fi
    
    - name: Show application logs
      if: always()  # Siempre mostrar logs, incluso si falla
      run: |
        echo "📋 Application logs:"
        cat flask_app.log || true
    
    - name: Stop application
      if: always()
      run: |
        if [ -f flask.pid ]; then
          kill $(cat flask.pid) 2>/dev/null || true
          rm flask.pid
        fi

  deploy:
    runs-on: ubuntu-latest
    needs: test-deploy
    if: github.ref == 'refs/heads/main' && success()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        echo "✅ Deployment simulation successful"
        # Aquí irían los comandos reales de deploy
