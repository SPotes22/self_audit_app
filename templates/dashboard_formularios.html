<!-- templates/dashboard_formularios.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Formularios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            background: #f0f2f5;
            padding: 8px 16px;
            border-radius: 20px;
            color: #333;
            font-weight: 500;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
            border-left: 5px solid;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card.delayed { border-left-color: #ffa502; }
        .stat-card.revised { border-left-color: #17a2b8; }
        .stat-card.approved { border-left-color: #28a745; }
        .stat-card.archived { border-left-color: #6c757d; }
        .stat-card.total { border-left-color: #667eea; }

        .stat-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-sub {
            font-size: 12px;
            color: #999;
        }

        /* Filtros */
        .filters-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filters-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .filter-group select, .filter-group input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-group select:focus, .filter-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .btn-filter {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-filter:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: #d0d0d0;
        }

        /* Tabla de formularios */
        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            padding: 15px 10px;
            text-align: left;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        /* Status badges */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .status-delayed { background: #fff3cd; color: #856404; }
        .status-revised { background: #d1ecf1; color: #0c5460; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-archived { background: #e2e3e5; color: #383d41; }

        /* Action buttons */
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin: 0 3px;
            transition: all 0.3s;
        }

        .btn-review { background: #17a2b8; color: white; }
        .btn-approve { background: #28a745; color: white; }
        .btn-archive { background: #6c757d; color: white; }
        .btn-delete { background: #dc3545; color: white; }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(110%);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-height: 100px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                📋 Dashboard de Formularios
                <span>v1.0</span>
            </h1>
            <div class="user-info">
                <div class="user-badge" id="userDisplay"></div>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsContainer">
            <div class="stat-card total" onclick="filterByStatus('all')">
                <div class="stat-title">Total</div>
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-sub">formularios</div>
            </div>
            <div class="stat-card delayed" onclick="filterByStatus('delayed')">
                <div class="stat-title">Pendientes</div>
                <div class="stat-number" id="delayedCount">0</div>
                <div class="stat-sub">por revisar</div>
            </div>
            <div class="stat-card revised" onclick="filterByStatus('revised')">
                <div class="stat-title">Revisados</div>
                <div class="stat-number" id="revisedCount">0</div>
                <div class="stat-sub">en espera</div>
            </div>
            <div class="stat-card approved" onclick="filterByStatus('approved')">
                <div class="stat-title">Aprobados</div>
                <div class="stat-number" id="approvedCount">0</div>
                <div class="stat-sub">completados</div>
            </div>
            <div class="stat-card archived" onclick="filterByStatus('archived')">
                <div class="stat-title">Archivados</div>
                <div class="stat-number" id="archivedCount">0</div>
                <div class="stat-sub">historial</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters-section">
            <div class="filters-title">🔍 Filtros</div>
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Estado</label>
                    <select id="statusFilter">
                        <option value="all">Todos</option>
                        <option value="delayed">Pendientes</option>
                        <option value="revised">Revisados</option>
                        <option value="approved">Aprobados</option>
                        <option value="archived">Archivados</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Usuario</label>
                    <input type="text" id="usernameFilter" placeholder="Filtrar por usuario...">
                </div>
                <div class="filter-group">
                    <label>Búsqueda</label>
                    <input type="text" id="searchFilter" placeholder="Buscar por nombre...">
                </div>
                <div class="filter-actions">
                    <button class="btn-filter" onclick="applyFilters()">Aplicar Filtros</button>
                    <button class="btn-reset" onclick="resetFilters()">Limpiar</button>
                </div>
            </div>
        </div>

        <!-- Tabla de formularios -->
        <div class="table-container">
            <table id="formulariosTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Dirección</th>
                        <th>Celular</th>
                        <th>Estado</th>
                        <th>Usuario</th>
                        <th>Fecha</th>
                        <th>Notas</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="9" class="loading">Cargando formularios...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para notas -->
    <div class="modal" id="notesModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Agregar Nota</div>
            <div class="modal-body">
                <textarea id="modalNotes" placeholder="Escribe una nota..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-review" onclick="confirmAction()">Confirmar</button>
                <button class="btn-archive" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // Estado global
        let currentFormId = null;
        let currentAction = null;
        let allFormularios = [];
        let userRole = null;
        let currentUsername = null;

        // Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
            loadFormularios();
            loadStats();
        });

        // Cargar información del usuario
        function loadUserInfo() {
            const token = getToken();
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    userRole = payload.role;
                    currentUsername = payload.username;
                    document.getElementById('userDisplay').textContent = `👤 ${payload.username} (${payload.role})`;
                } catch (e) {
                    console.error('Error parsing token:', e);
                }
            }
        }

        // Obtener token
        function getToken() {
            return sessionStorage.getItem('token') || '{{ session.token }}';
        }

        // Cargar estadísticas
        async function loadStats() {
            try {
                const response = await fetch('/api/formularios/estadisticas', {
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('totalCount').textContent = data.estadisticas.total || 0;
                    document.getElementById('delayedCount').textContent = data.estadisticas.delayed || 0;
                    document.getElementById('revisedCount').textContent = data.estadisticas.revised || 0;
                    document.getElementById('approvedCount').textContent = data.estadisticas.approved || 0;
                    document.getElementById('archivedCount').textContent = data.estadisticas.archived || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Cargar formularios
        async function loadFormularios(filters = {}) {
            try {
                let url = '/api/formularios';
                const params = new URLSearchParams();
                
                if (filters.status && filters.status !== 'all') {
                    params.append('status', filters.status);
                }
                if (filters.username) {
                    params.append('username', filters.username);
                }
                
                if (params.toString()) {
                    url += '?' + params.toString();
                }

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    allFormularios = data.formularios;
                    applySearchFilter(filters.search);
                }
            } catch (error) {
                console.error('Error loading formularios:', error);
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="9" class="error-message">Error al cargar los datos</td>
                    </tr>
                `;
            }
        }

        // Aplicar filtro de búsqueda
        function applySearchFilter(searchTerm) {
            if (!searchTerm) {
                renderTable(allFormularios);
                return;
            }

            const filtered = allFormularios.filter(f => 
                f.nombre.toLowerCase().includes(searchTerm.toLowerCase())
            );
            renderTable(filtered);
        }

        // Renderizar tabla
        function renderTable(formularios) {
            const tbody = document.getElementById('tableBody');
            
            if (formularios.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 30px; color: #666;">
                            No hay formularios para mostrar
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = formularios.map(f => `
                <tr>
                    <td>#${f.id}</td>
                    <td><strong>${f.nombre}</strong></td>
                    <td>${f.direccion_fisica}</td>
                    <td>${f.celular}</td>
                    <td>
                        <span class="status-badge status-${f.status}">
                            ${getStatusText(f.status)}
                        </span>
                    </td>
                    <td>${f.username || 'N/A'}</td>
                    <td>${formatDate(f.created_at)}</td>
                    <td>
                        ${f.notes ? `<small>📝 ${f.notes.substring(0, 30)}${f.notes.length > 30 ? '...' : ''}</small>` : '-'}
                    </td>
                    <td>
                        ${renderActions(f)}
                    </td>
                </tr>
            `).join('');
        }

        // Obtener texto del estado
        function getStatusText(status) {
            const texts = {
                'delayed': 'Pendiente',
                'revised': 'Revisado',
                'approved': 'Aprobado',
                'archived': 'Archivado'
            };
            return texts[status] || status;
        }

        // Formatear fecha
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-ES', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Renderizar acciones según rol y estado
        function renderActions(form) {
            const isAdmin = userRole === 'admin';
            const actions = [];

            if (form.status === 'delayed') {
                actions.push(`<button class="action-btn btn-review" onclick="openModal(${form.id}, 'revised')">Revisar</button>`);
            }
            
            if (form.status === 'revised' && isAdmin) {
                actions.push(`<button class="action-btn btn-approve" onclick="openModal(${form.id}, 'approved')">Aprobar</button>`);
            }
            
            if (isAdmin && form.status !== 'archived') {
                actions.push(`<button class="action-btn btn-archive" onclick="updateStatus(${form.id}, 'archived')">Archivar</button>`);
            }
            
            if (isAdmin) {
                actions.push(`<button class="action-btn btn-delete" onclick="deleteForm(${form.id})">Eliminar</button>`);
            }

            return actions.join(' ') || '-';
        }

        // Abrir modal para acciones con nota
        function openModal(formId, action) {
            currentFormId = formId;
            currentAction = action;
            
            const titles = {
                'revised': 'Revisar Formulario',
                'approved': 'Aprobar Formulario'
            };
            
            document.getElementById('modalTitle').textContent = titles[action] || 'Agregar Nota';
            document.getElementById('notesModal').style.display = 'flex';
        }

        // Cerrar modal
        function closeModal() {
            document.getElementById('notesModal').style.display = 'none';
            document.getElementById('modalNotes').value = '';
            currentFormId = null;
            currentAction = null;
        }

        // Confirmar acción del modal
        async function confirmAction() {
            if (!currentFormId || !currentAction) return;
            
            const notes = document.getElementById('modalNotes').value;
            await updateStatus(currentFormId, currentAction, notes);
            closeModal();
        }

        // Actualizar estado
        async function updateStatus(formId, newStatus, notes = '') {
            try {
                const response = await fetch(`/api/formularios/${formId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ status: newStatus, notes })
                });

                if (response.ok) {
                    // Recargar datos
                    loadFormularios();
                    loadStats();
                    showNotification('✅ Estado actualizado correctamente', 'success');
                } else {
                    const error = await response.json();
                    showNotification('❌ Error: ' + (error.error || 'Error desconocido'), 'error');
                }
            } catch (error) {
                console.error('Error updating status:', error);
                showNotification('❌ Error al actualizar', 'error');
            }
        }

        // Eliminar formulario
        async function deleteForm(formId) {
            if (!confirm('¿Estás seguro de eliminar este formulario?')) return;

            try {
                const response = await fetch(`/api/formularios/${formId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });

                if (response.ok) {
                    loadFormularios();
                    loadStats();
                    showNotification('✅ Formulario eliminado', 'success');
                } else {
                    showNotification('❌ Error al eliminar', 'error');
                }
            } catch (error) {
                console.error('Error deleting form:', error);
                showNotification('❌ Error al eliminar', 'error');
            }
        }

        // Aplicar filtros
        function applyFilters() {
            const filters = {
                status: document.getElementById('statusFilter').value,
                username: document.getElementById('usernameFilter').value,
                search: document.getElementById('searchFilter').value
            };
            loadFormularios(filters);
        }

        // Resetear filtros
        function resetFilters() {
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('usernameFilter').value = '';
            document.getElementById('searchFilter').value = '';
            loadFormularios();
        }

        // Filtrar por estado (desde cards)
        function filterByStatus(status) {
            document.getElementById('statusFilter').value = status;
            applyFilters();
        }

        // Mostrar notificación
        function showNotification(message, type) {
            // Crear elemento de notificación
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                z-index: 2000;
                animation: slideIn 0.3s ease;
                ${type === 'success' ? 'background: #28a745;' : 'background: #dc3545;'}
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Logout
        function logout() {
            sessionStorage.removeItem('token');
            window.location.href = '/login';
        }

        // Añadir estilo de animación
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
