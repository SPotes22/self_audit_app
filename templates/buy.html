<!-- templates/buy.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Compra</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .success { background-color: #d4edda; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
        .error { background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Formulario de Compra</h1>
    
    {% if success %}
    <div class="success">
        ✅ {{ message }} (ID: {{ formulario_id }})
    </div>
    {% endif %}
    
    <form id="buyForm" method="POST" action="/buy">
        <div class="form-group">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" required minlength="3" maxlength="100">
        </div>
        
        <div class="form-group">
            <label for="direccion_fisica">Dirección física:</label>
            <input type="text" id="direccion_fisica" name="direccion_fisica" required maxlength="200">
        </div>
        
        <div class="form-group">
            <label for="celular">Celular:</label>
            <input type="tel" id="celular" name="celular" required pattern="[0-9]{7,15}" 
                   title="Solo números, entre 7 y 15 dígitos">
        </div>
        
        <button type="submit">Enviar formulario</button>
    </form>
    
    <hr>
    <p>Estado inicial del formulario: <strong>delayed</strong></p>
    
    <script>
        document.getElementById('buyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                nombre: formData.get('nombre'),
                direccion_fisica: formData.get('direccion_fisica'),
                celular: formData.get('celular')
            };
            
            try {
                const response = await fetch('/buy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer {{ session.token }}'  // Si tienes token en sesión
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert('✅ Formulario enviado correctamente');
                    window.location.reload();
                } else {
                    const error = await response.json();
                    alert('❌ Error: ' + (error.error || error.message));
                }
            } catch (error) {
                alert('❌ Error de conexión');
            }
        });
    </script>
</body>
</html>
